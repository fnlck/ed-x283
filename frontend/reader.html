<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Reader</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .reader-container {
            border: 2px solid var(--accent);
            padding: 30px;
            border-radius: 6px;
            width: 360px;
            text-align: center;
        }
        select {
            width: 100%;
            padding: 8px;
            background: var(--bg);
            border: 1px solid var(--accent);
            color: var(--accent);
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 16px;
        }
        .camera-box {
            width: 100%;
            height: 240px;
            border: 1px dashed var(--accent);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            color: var(--accent);
        }
    </style>
</head>
<body>

    <div class="reader-container">
        <h2 style="margin-bottom: 20px;">QR Scanner</h2>
        
        <div class="form-group">
            <label style="text-align: left;">Select Mode</label>
            <select id="scanner-mode">
                <option value="check-in">Attendance Check-In</option>
                <option value="registration">Student Registration</option>
            </select>
        </div>

        <div class="camera-box">
            <p>[ Camera Viewport ]</p>
        </div>

        <button class="login-btn" id="scan-trigger">Start Scanner</button>
    </div>

</body>
</html>
